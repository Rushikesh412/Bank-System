<!DOCTYPE html>
<html>
<head>
    <title>National Bank System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏦 National Bank</h1>
        <p>Multi-Branch Banking System</p>
    </div>

    <div class="card">
        <h2>🔐 Login</h2>
        <input id="loginContact" placeholder="Contact Number" type="tel">
        <input id="loginPassword" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="card">
        <h2>📝 Register New Customer</h2>
        <input id="name" placeholder="Full Name">
        <input id="address" placeholder="Address">
        <input id="contact" placeholder="Contact Number" type="tel">
        <input id="email" placeholder="Email" type="email">
        <input id="dob" type="date" placeholder="Date of Birth">
        <input id="password" type="password" placeholder="Password">
        <button onclick="register()">Register</button>
    </div>

    <div class="card">
        <h2>ℹ️ Contact Us</h2>
        <p><strong>National Bank Headquarters:</strong> Mumbai</p>
        <p><strong>Toll Free:</strong> 1800-123-4567</p>
        <p><strong>Available Branches:</strong> Mumbai, Delhi, Bangalore, Pune, Kolkata</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
