<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>National Bank System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏦 National Bank</h1>
        <p>Employee onboarding and customer login system</p>
    </div>

    <div class="card">
        <h2>🛠️ Admin Portal</h2>
        <input id="adminUser" placeholder="Admin Username">
        <input id="adminPassword" placeholder="Admin Password" type="password">
        <button onclick="adminLogin()">Go to Admin Portal</button>
        <p class="help-text">Admin credentials required to access the admin page.</p>
    </div>

    <div class="card">
        <h2>🔐 Customer Login</h2>
        <input id="loginId" placeholder="Login ID (e.g. CUST0001)">
        <input id="loginPassword" placeholder="Password" type="password">
        <button onclick="login()">Login</button>
        <p class="help-text">Customer should use their unique Login ID and password issued by admin.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
